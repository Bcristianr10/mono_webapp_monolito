{% extends "base.html" %}
{% block title %}Usuarios{% endblock %}
{% block content %}
<h2 class="mb-4">Usuarios</h2>
<div class="table-responsive">
<table class="table table-striped bg-white">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Rol</th>
            <th>Creado</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.full_name }}</td>
            <td>{{ u.email }}</td>
            <td><span class="badge bg-secondary">{{ u.role_label }}</span></td>
            <td>{{ u.created_at.strftime("%Y-%m-%d") }}</td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="text-center text-muted">No hay usuarios.</td></tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
